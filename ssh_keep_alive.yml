name: Keep Servers Alive (with Telegram Notification)

on:
  schedule:
    # 周期运行：每3天的中午 12:00 执行一次保活 (比每10天更加保险)
    - cron: '0 12 */3 * *'
  workflow_dispatch: 

jobs:
  keep_servers_alive:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Install required packages
        run: |
          sudo apt-get update
          sudo apt-get install -y sshpass jq curl

      - name: Process each account and notify Telegram
        env:
          ACCOUNTS: ${{ secrets.ACCOUNTS }}
          TG_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TG_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: |
          echo "====================================================="
          echo " 增强版 VPS 远程登录保活脚本 (支持 Telegram 通知) "
          echo "====================================================="
          
          if [ -z "${ACCOUNTS}" ]; then
            echo "❌ 错误: 未在 GitHub Secrets 中配置 ACCOUNTS，请先在 Secrets 中添加该配置！"
            exit 1
          fi
          
          count=0
          success_count=0
          fail_count=0
          tg_message=""
          
          # 解析 JSON 并循环登录
          for account in $(echo "${ACCOUNTS}" | jq -c '.[]'); do
            count=$((count+1))
            SSH_USER=$(echo $account | jq -r '.SSH_USER')
            SSH_PASS=$(echo $account | jq -r '.SSH_PASS')
            HOST=$(echo $account | jq -r '.HOST')
            PORT=$(echo $account | jq -r '.PORT')
            
            # 使用 sshpass 模拟 SSH 远程登录并执行 exit
            if sshpass -p "$SSH_PASS" ssh -p "$PORT" -o StrictHostKeyChecking=no -o ConnectTimeout=15 "$SSH_USER@$HOST" -q exit; then
              echo "🎉 成功！第【$count】台服务器连接成功！地址: $HOST, 账户: $SSH_USER"
              tg_message="${tg_message}✅ *[No.${count}]* 服务器保活成功\n🌐 主机: \`${HOST}\`\n👤 账户: \`${SSH_USER}\`\n\n"
              success_count=$((success_count+1))
            else
              echo "💥 失败！第【$count】台服务器连接失败！地址: $HOST, 账户: $SSH_USER"
              tg_message="${tg_message}❌ *[No.${count}]* 服务器保活失败\n🌐 主机: \`${HOST}\`\n👤 账户: \`${SSH_USER}\`\n⚠️ 提示: 请检查密码有效性或服务器是否宕机。\n\n"
              fail_count=$((fail_count+1))
            fi
            sleep 3
          done
          
          # 发送 Telegram 状态汇报
          if [ -n "$TG_BOT_TOKEN" ] && [ -n "$TG_CHAT_ID" ]; then
            final_message="🔔 *VPS 远程登录保活执行报告*\n\n"
            final_message="${final_message}📊 *统计汇总*:\n- 成功: \`${success_count}\` 台\n- 失败: \`${fail_count}\` 台\n- 总计: \`${count}\` 台\n\n"
            final_message="${final_message}📝 *保活详情*:\n${tg_message}"
            
            echo "正在推送 Telegram 通知..."
            curl -s -X POST "https://api.telegram.org/bot${TG_BOT_TOKEN}/sendMessage" \
              -d "chat_id=${TG_CHAT_ID}" \
              -d "parse_mode=Markdown" \
              -d "text=$(echo -e "$final_message")" > /dev/null
            echo "Telegram 通知发送成功。"
          else
            echo "ℹ️ 提示: 未配置 TELEGRAM_BOT_TOKEN 或 TELEGRAM_CHAT_ID，跳过 Telegram 发送。"
          fi
